<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .header img { width: 28px; height: 28px; }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #f1f5f9;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #334155;
      border-radius: 8px;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      text-align: left;
    }

    .btn:hover { background: #334155; border-color: #475569; }
    .btn:active { transform: scale(0.98); }

    .btn + .btn { margin-top: 8px; }

    .btn-primary {
      background: #3b82f6;
      border-color: #3b82f6;
      color: white;
    }
    .btn-primary:hover { background: #2563eb; border-color: #2563eb; }

    .btn .icon { font-size: 18px; flex-shrink: 0; }
    .btn .label { flex: 1; }
    .btn .shortcut {
      font-size: 11px;
      color: #94a3b8;
      background: #0f172a;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
    }
    .btn-primary .shortcut { background: rgba(0,0,0,0.2); color: #bfdbfe; }

    .stats {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 6px;
      background: #1e293b;
      border: 1px solid #334155;
      display: none;
    }

    .stats-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #94a3b8;
    }

    .stats-row + .stats-row { margin-top: 4px; }

    .stats-row .value {
      color: #e2e8f0;
      font-weight: 500;
      font-family: monospace;
    }

    .stats-row .fits { color: #6ee7b7; }
    .stats-row .tight { color: #fbbf24; }
    .stats-row .over { color: #fca5a5; }

    .status {
      margin-top: 12px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
      display: none;
    }

    .status.success { display: block; background: #064e3b; color: #6ee7b7; }
    .status.error { display: block; background: #7f1d1d; color: #fca5a5; }

    .footer {
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #1e293b;
      font-size: 11px;
      color: #64748b;
      text-align: center;
    }

    .footer a {
      color: #60a5fa;
      text-decoration: none;
    }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="">
    <h1>Copy as Markdown</h1>
  </div>

  <button class="btn btn-primary" id="copyPage">
    <span class="icon">📄</span>
    <span class="label">Copy full page</span>
    <span class="shortcut">Ctrl+Shift+M</span>
  </button>

  <button class="btn" id="copySelection">
    <span class="icon">✂️</span>
    <span class="label">Copy selection</span>
    <span class="shortcut">Ctrl+Shift+K</span>
  </button>

  <div id="stats" class="stats">
    <div class="stats-row">
      <span>Tokens</span>
      <span class="value" id="tokenCount">—</span>
    </div>
    <div class="stats-row">
      <span>Characters</span>
      <span class="value" id="charCount">—</span>
    </div>
    <div class="stats-row">
      <span>GPT-4o (128K)</span>
      <span class="value" id="fitGpt">—</span>
    </div>
    <div class="stats-row">
      <span>Claude (200K)</span>
      <span class="value" id="fitClaude">—</span>
    </div>
  </div>

  <div id="status" class="status"></div>

  <div class="footer">
    Clean Markdown for AI tools
  </div>

  <script src="popup.js"></script>
</body>
</html>
